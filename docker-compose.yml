version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=geniusgen_db
      - POSTGRES_USER=geniusgen_user
      - POSTGRES_PASSWORD=secure_password_here
    restart: always

  web:
    build: .
    command: sh -c "python manage.py migrate --no-input && gunicorn geniusgen.wsgi --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 120"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=generate_a_random_secret_key_here
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://geniusgen_user:secure_password_here@db:5432/geniusgen_db
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
