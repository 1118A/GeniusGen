{% extends 'base.html' %}
{% block title %}Delete Quiz{% endblock %}
{% block content %}
<div class="container" style="max-width:500px">
  <div class="card text-center" style="margin-top:3rem;padding:2rem;">
    <div style="font-size:3rem;margin-bottom:1rem;">🗑️</div>
    <h2 class="page-title">Delete Quiz?</h2>
    <p class="page-subtitle">This will permanently delete "{{ quiz.title }}" and all associated results.</p>
    <div class="flex gap-2 mt-4" style="justify-content:center;">
      <form method="post">{% csrf_token %}<button type="submit" class="btn btn-danger">Yes, Delete</button></form>
      <a href="{% url 'quizzes:list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
