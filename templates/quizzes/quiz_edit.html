{% extends 'base.html' %}
{% block title %}Edit Quiz{% endblock %}
{% block content %}
<div class="container" style="max-width:600px">
  <div class="page-header">
    <h1 class="page-title">✏️ Edit Quiz</h1>
  </div>
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<span class="form-error">{{ field.errors|join:", " }}</span>{% endif %}
        </div>
        {% endfor %}
        <div class="flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{% url 'quizzes:list' %}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
